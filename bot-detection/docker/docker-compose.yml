services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: rexell_user
      POSTGRES_PASSWORD: rexell_password
      POSTGRES_DB: bot_detection
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rexell_user -d bot_detection"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: rexell_user
      RABBITMQ_DEFAULT_PASS: rexell_password
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2023-11-20T22-40-07Z
    environment:
      MINIO_ROOT_USER: rexell_admin
      MINIO_ROOT_PASSWORD: rexell_password
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # Minio initialization hook to create buckets described in requirements
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc config host add myminio http://minio:9000 rexell_admin rexell_password;
      /usr/bin/mc mb myminio/challenge-content --ignore-existing;
      /usr/bin/mc mb myminio/training-data --ignore-existing;
      /usr/bin/mc mb myminio/bot-detection-models --ignore-existing;
      /usr/bin/mc mb myminio/bot-detection-archive --ignore-existing;
      /usr/bin/mc anonymous set public myminio/challenge-content;
      echo 'MinIO buckets initialized.'
      "

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
