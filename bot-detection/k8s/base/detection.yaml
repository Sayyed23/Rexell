apiVersion: apps/v1
kind: Deployment
metadata:
  name: detection
  namespace: bot-detection
  labels:
    app: detection
spec:
  replicas: 2
  selector:
    matchLabels:
      app: detection
  template:
    metadata:
      labels:
        app: detection
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: detection
          image: ghcr.io/rexell/bot-detection:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: bot-detection-config
            - secretRef:
                name: bot-detection-secrets
          readinessProbe:
            httpGet:
              path: /v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: detection
  namespace: bot-detection
spec:
  selector:
    app: detection
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: detection
  namespace: bot-detection
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: detection
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
