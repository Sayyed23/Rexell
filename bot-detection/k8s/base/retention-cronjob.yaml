apiVersion: batch/v1
kind: CronJob
metadata:
  name: retention-daily
  namespace: bot-detection
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: retention
              image: ghcr.io/rexell/bot-detection-training:latest
              command: ["python", "-m", "services.shared.src.shared.retention_runner"]
              envFrom:
                - configMapRef:
                    name: bot-detection-config
                - secretRef:
                    name: bot-detection-secrets
