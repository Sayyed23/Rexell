# NOTE: these are placeholders. In real clusters secrets should be managed
# via an external secret manager (SealedSecrets, Vault, SOPS, etc.).
apiVersion: v1
kind: Secret
metadata:
  name: bot-detection-secrets
  namespace: bot-detection
type: Opaque
stringData:
  DATABASE_URL: "postgresql+asyncpg://rexell_user:rexell_password@postgres:5432/bot_detection"
  REDIS_URL: "redis://redis:6379/0"
  RABBITMQ_URL: "amqp://rexell_user:rexell_password@rabbitmq:5672/"
  TOKEN_SIGNING_KEY: "replace-me"
  WALLET_SALT: "replace-me-salt"
  API_KEYS: "dev-key-1,dev-key-2"
  MINIO_ACCESS_KEY: "rexell_admin"
  MINIO_SECRET_KEY: "rexell_password"
