global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: detection
    metrics_path: /metrics
    static_configs:
      - targets:
          - detection:8000
  - job_name: challenge
    metrics_path: /metrics
    static_configs:
      - targets:
          - challenge:8001
  - job_name: ml-inference
    metrics_path: /metrics
    static_configs:
      - targets:
          - ml-inference:8080
